services:
  backend:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run frontend/app_fixed.py --server.port 8501 --server.address 0.0.0.0
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend